<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Interaktif Bidang Miring di Gudang Logistik</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            padding: 25px;
        }
        h2 {
            text-align: center;
            color: #0e141a;
            margin-top: 0;
        }
        .canvas-container {
            text-align: center;
            background-color: #eaeded;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        canvas {
            background-color: #ffffff;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            max-width: 100%;
        }
        .controls {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .slider-group label {
            font-weight: bold;
            flex: 1;
        }
        .slider-group input {
            flex: 2;
            margin: 0 15px;
        }
        .slider-group .value-display {
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            min-width: 80px;
            text-align: right;
        }
        .status-box {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .status-aman {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-overload {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            animation: blink 1s infinite alternate;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.8; }
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .metric-card {
            background-color: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #dcdde1;
        }
        .metric-card h3 {
            margin: 0 0 8px 0;
            font-size: 0.9em;
            color: #718093;
            text-transform: uppercase;
        }
        .metric-card p {
            margin: 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #2f3640;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulasi Bidang Miring & Gaya Tarik di Gudang Logistik</h2>
    
    <!-- Bagian Visualisasi Grafik -->
    <div class="canvas-container">
        <canvas id="simCanvas" width="700" height="300"></canvas>
    </div>

    <!-- Bagian Kontrol Slider -->
    <div class="controls">
        <div class="slider-group">
            <label for="sudutSlider">Sudut Kemiringan (θ):</label>
            <input type="range" id="sudutSlider" min="5" max="45" step="0.1" value="23.6">
            <span class="value-display" id="sudutVal">23.6°</span>
        </div>
    </div>

    <!-- Indikator Status Kelayakan Mesin -->
    <div id="statusMesin" class="status-box status-aman">
        STATUS MESIN: AMAN / LAYAK OPERASIONAL
    </div>

    <!-- Tampilan Parameter Angka/Metrik Fisika -->
    <div class="metrics-grid">
        <div class="metric-card">
            <h3>Panjang Lintasan (s)</h3>
            <p id="lintasanMetrik">5.00 m</p>
        </div>
        <div class="metric-card">
            <h3>Gaya Tarik Diperlukan (F)</h3>
            <p id="gayaMetrik">582.0 N</p>
        </div>
        <div class="metric-card">
            <h3>Usaha Gesek Terbuang (W gesek)</h3>
            <p id="usahaMetrik">910.0 J</p>
        </div>
    </div>
</div>

<script>
    // Konstanta Fisika Sesuai Kasus
    const m = 100;       // Massa beban (kg)
    const g = 10;        // Percepatan gravitasi (m/s^2)
    const h = 2;         // Ketinggian panggung tetap (m)
    const mu = 0.2;      // Koefisien gesek kinetik
    const maxGaya = 650; // Batas beban maksimum mesin (N)

    // Mengambil Elemen DOM HTML
    const slider = document.getElementById('sudutSlider');
    const sudutVal = document.getElementById('sudutVal');
    const statusMesin = document.getElementById('statusMesin');
    const lintasanMetrik = document.getElementById('lintasanMetrik');
    const gayaMetrik = document.getElementById('gayaMetrik');
    const usahaMetrik = document.getElementById('usahaMetrik');
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // Fungsi Utama Perhitungan dan Update Tampilan
    function updateSimulasi() {
        const sudutDerajat = parseFloat(slider.value);
        const sudutRadian = sudutDerajat * (Math.PI / 180);

        // Tampilkan nilai sudut saat slider digeser
        sudutVal.innerText = sudutDerajat.toFixed(1) + "°";

        // 1. Hitung Rumus Fisika Real-Time
        const s = h / Math.sin(sudutRadian);
        const w = m * g;
        const F = (w * Math.sin(sudutRadian)) + (mu * w * Math.cos(sudutRadian));
        const W_gesek = mu * w * Math.cos(sudutRadian) * s;

        // 2. Update Informasi Angka/Metrik ke Layar HTML
        lintasanMetrik.innerText = s.toFixed(2) + " m";
        gayaMetrik.innerText = F.toFixed(1) + " N";
        usahaMetrik.innerText = W_gesek.toFixed(0) + " J";

        // 3. Logika Evaluasi Batas Ambang Gaya Mesin (650 N)
        if (F <= maxGaya) {
            statusMesin.innerText = "STATUS MESIN: AMAN / LAYAK OPERASIONAL";
            statusMesin.className = "status-box status-aman";
        } else {
            statusMesin.innerText = "STATUS MESIN: OVERLOAD / MOTOR MATI (F > 650 N)";
            statusMesin.className = "status-box status-overload";
        }

        // 4. Proses Menggambar Diagram Segitiga Dinamis pada Canvas HTML5
        drawCanvas(sudutRadian, F);
    }

    function drawCanvas(sudutRadian, gayaSekarang) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Pengaturan Skala agar Segitiga Pas Masuk di Kotak Canvas
        const groundY = 250; 
        const rightX = 600;  
        const scale = 100;   // 1 meter diwakili oleh 100 piksel di layar
        
        const tinggiPixel = h * scale;
        const alasPixel = tinggiPixel / Math.tan(sudutRadian);
        const leftX = rightX - alasPixel;
        const topY = groundY - tinggiPixel;

        // A. Menggambar Struktur Utama Segitiga Bidang Miring
        ctx.beginPath();
        ctx.moveTo(leftX, groundY); // Titik sudut lantai bawah
        ctx.lineTo(rightX, groundY); // Titik sudut lantai kanan bawah panggung
        ctx.lineTo(rightX, topY);    // Titik puncak panggung atas
        ctx.closePath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#2c3e50';
        ctx.fillStyle = '#dfe4ea';
        ctx.fill();
        ctx.stroke();

        // B. Menggambar Garis Pembatas Tinggi Panggung Tetap (2 Meter)
        ctx.beginPath();
        ctx.moveTo(rightX + 15, groundY);
        ctx.lineTo(rightX + 15, topY);
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#7f8c8d';
        ctx.stroke();
        ctx.fillStyle = '#7f8c8d';
        ctx.font = '12px Arial';
        ctx.fillText("h = 2m (Tetap)", rightX + 22, (groundY + topY)/2);

        // C. Menggambar Balok Beban di Tengah Lintasan Miring
        const midX = (leftX + rightX) / 2;
        const midY = (groundY + topY) / 2;

        ctx.save();
        ctx.translate(midX, midY);
        ctx.rotate(-sudutRadian); // Memutar koordinat gambar mengikuti sudut miring

        // Kotak Beban (Palet Logistik)
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(-25, -25, 50, 25);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = '#d35400';
        ctx.strokeRect(-25, -25, 50, 25);

        // Vektor Panah Gaya Tarik F (Berubah warna jadi merah jika Overload)
        ctx.beginPath();
        ctx.moveTo(25, -12.5);
        ctx.lineTo(80, -12.5);
        ctx.lineWidth = 3;
        ctx.strokeStyle = (gayaSekarang > maxGaya) ? '#e74c3c' : '#2ecc71';
        ctx.stroke();
        
        // Kepala Panah Vektor Gaya
        ctx.beginPath();
        ctx.moveTo(80, -12.5);
        ctx.lineTo(72, -18);
        ctx.lineTo(72, -7);
        ctx.fillStyle = (gayaSekarang > maxGaya) ? '#e74c3c' : '#2ecc71';
        ctx.fill();

        ctx.restore();
    }

    // Menghubungkan Fungsi Utama ke Event Perubahan Slider
    slider.addEventListener('input', updateSimulasi);
    
    // Menjalankan Fungsi Pertama Kali Saat Halaman Dimuat
    updateSimulasi();
</script>

</body>
</html>
